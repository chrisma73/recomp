<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Recomp">
<meta name="theme-color" content="#0f0f0f">
<title>Recomp Protocol</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230f0f0f'/%3E%3Ctext x='90' y='128' font-family='Arial Black,sans-serif' font-weight='900' font-size='120' text-anchor='middle' fill='%2300ff88'%3ER%3C/text%3E%3C/svg%3E">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230f0f0f'/%3E%3Ctext x='90' y='128' font-family='Arial Black,sans-serif' font-weight='900' font-size='120' text-anchor='middle' fill='%2300ff88'%3ER%3C/text%3E%3C/svg%3E">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { overscroll-behavior-y: none; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: #f0f0f0;
  min-height: 100vh;
  padding-bottom: 90px;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; }
.container { max-width: 600px; margin: 0 auto; padding: 26px 20px; }

/* HEADER */
.logo { font-size: 10px; letter-spacing: 0.35em; color: #00ff88; font-weight: 800; text-transform: uppercase; }
.heading { font-size: 46px; font-weight: 900; line-height: 0.95; letter-spacing: -0.03em; margin-top: 8px; text-transform: uppercase; color: #fff; font-style: italic; }
.subheading { color: #888; font-size: 13px; margin-top: 8px; letter-spacing: 0.02em; }
.header { margin-bottom: 28px; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 26px; }
.stat-card { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 16px 12px; border-radius: 6px; }
.stat-label { font-size: 9px; color: #666; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 700; }
.stat-value { font-size: 32px; font-weight: 900; margin-top: 4px; line-height: 1; font-style: italic; color: #fff; }

/* SECTION LABELS */
.section-label { font-size: 10px; letter-spacing: 0.3em; color: #666; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
.section-label::before { content: ''; width: 20px; height: 1px; background: #333; }

/* DAY CARDS */
.day-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 16px 18px; margin-bottom: 8px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
.day-card:active { transform: scale(0.99); }
.day-accent { width: 3px; height: 44px; border-radius: 2px; flex-shrink: 0; }
.day-content { flex: 1; }
.day-num { font-size: 10px; color: #666; font-weight: 700; letter-spacing: 0.2em; }
.day-name { font-size: 18px; font-weight: 900; letter-spacing: -0.01em; color: #fff; text-transform: uppercase; font-style: italic; margin-top: 2px; }
.day-subtitle { font-size: 12px; color: #888; margin-top: 3px; }
.chevron { color: #555; font-size: 18px; }

/* PILLS */
.pill { font-size: 9px; padding: 4px 9px; border-radius: 3px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 800; }
.pill-upper { background: #00ff88; color: #0f0f0f; }
.pill-lower { background: #ff3d71; color: #fff; }
.pill-push { background: #00d4ff; color: #0f0f0f; }
.pill-pull { background: #ffbe0b; color: #0f0f0f; }
.pill-cardio { background: #8e6bcc; color: #fff; }

.card-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

/* BUTTONS */
.btn-primary { background: #00ff88; color: #0f0f0f; padding: 18px 24px; border-radius: 6px; font-weight: 800; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; width: 100%; margin-top: 24px; }
.btn-secondary { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 16px; border-radius: 4px; font-size: 11px; letter-spacing: 0.15em; font-weight: 700; text-transform: uppercase; }
.btn-danger { margin-top: 24px; background: transparent; color: #666; border: 1px solid #2a2a2a; padding: 12px 20px; border-radius: 6px; font-size: 11px; letter-spacing: 0.2em; width: 100%; font-weight: 700; text-transform: uppercase; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f0f0f; border-top: 1px solid #2a2a2a; display: flex; justify-content: space-around; padding: 12px 0 calc(18px + env(safe-area-inset-bottom)); z-index: 10; }
.nav-btn { color: #666; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 14px; font-weight: 700; }
.nav-btn.active { color: #00ff88; }
.nav-icon { font-size: 18px; }

.back-btn { color: #fff; display: flex; align-items: center; gap: 6px; font-size: 12px; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; }

/* WARM-UP / INFO BOXES */
.warmup { background: #1a1a1a; border-left: 3px solid #00ff88; border-radius: 0 6px 6px 0; padding: 14px 16px; margin: 20px 0 16px; font-size: 12px; color: #bbb; line-height: 1.6; }
.warmup-title { font-size: 10px; letter-spacing: 0.25em; font-weight: 800; color: #00ff88; margin-bottom: 6px; text-transform: uppercase; }

.acl-warning { background: linear-gradient(135deg, #3d1a1a, #2a0f0f); border: 1px solid #ff3d71; border-radius: 6px; padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 10px; align-items: flex-start; }
.acl-warning-icon { color: #ff3d71; font-size: 18px; flex-shrink: 0; }
.acl-warning-text { font-size: 12px; color: #ffb3c6; line-height: 1.5; }
.acl-warning-text strong { color: #fff; }

.deload-banner { background: #8e6bcc; color: #fff; padding: 10px 14px; border-radius: 6px; font-size: 11px; letter-spacing: 0.15em; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; text-transform: uppercase; }

/* SPOTIFY */
.playlist-bar { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.playlist-label { font-size: 10px; color: #666; letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; }
.playlist-name { font-size: 14px; color: #fff; font-weight: 700; margin-top: 2px; }
.spotify-btn { background: #1DB954; color: #fff; padding: 8px 14px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* SESSION TIMER */
.session-bar { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px 16px; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.session-bar.running { background: #00ff88; color: #0f0f0f; border-color: #00ff88; }
.session-label { font-size: 10px; letter-spacing: 0.2em; font-weight: 700; text-transform: uppercase; }
.session-bar .session-label { color: #666; }
.session-bar.running .session-label { color: #0f0f0f; opacity: 0.7; }
.session-time { font-size: 22px; font-weight: 900; font-style: italic; margin-top: 2px; font-variant-numeric: tabular-nums; }
.session-btn { padding: 10px 16px; border-radius: 20px; font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; flex-shrink: 0; }
.session-btn-start { background: #00ff88; color: #0f0f0f; }
.session-btn-stop { background: #0f0f0f; color: #00ff88; }

/* PROGRESS BAR */
.progress-bar-wrap { margin-bottom: 14px; }
.progress-bar-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 10px; letter-spacing: 0.2em; font-weight: 700; }
.progress-bar { height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #00ff88; transition: width 0.3s; }

/* REST TIMER */
.rest-timer { background: #00ff88; color: #0f0f0f; padding: 14px 16px; border-radius: 6px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 8px; z-index: 5; }
.rest-timer-label { font-size: 10px; letter-spacing: 0.2em; font-weight: 800; }
.rest-timer-time { font-size: 28px; font-weight: 900; font-style: italic; font-variant-numeric: tabular-nums; }

/* EXERCISES */
.exercise { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 16px 18px; margin-bottom: 10px; }
.exercise.acl-flagged { border-left: 3px solid #ff3d71; }
.exercise-meta { font-size: 10px; font-weight: 800; letter-spacing: 0.2em; color: #00ff88; text-transform: uppercase; }
.exercise-name { font-size: 17px; font-weight: 900; margin-top: 4px; color: #fff; font-style: italic; text-transform: uppercase; letter-spacing: -0.01em; }
.exercise-notes { font-size: 12px; color: #aaa; margin-top: 6px; line-height: 1.5; }
.exercise-acl-flag { font-size: 10px; color: #ff3d71; font-weight: 800; letter-spacing: 0.15em; margin-top: 6px; text-transform: uppercase; }
.exercise-rest { margin-top: 10px; font-size: 10px; color: #666; letter-spacing: 0.15em; font-weight: 700; text-transform: uppercase; }
.exercise-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.exercise-header-left { flex: 1; }
.video-btn { background: #0f0f0f; border: 1px solid #333; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #ff3d71; font-size: 14px; flex-shrink: 0; text-decoration: none; }
.video-btn:hover { border-color: #ff3d71; }

/* LAST TIME */
.last-time { background: #242424; border-radius: 4px; padding: 8px 12px; margin-top: 10px; font-size: 11px; color: #bbb; display: flex; align-items: center; gap: 8px; }
.last-time-label { font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; font-size: 9px; color: #00ff88; }

/* SET ROWS */
.sets-table { margin-top: 12px; }
.sets-header { display: grid; grid-template-columns: 50px 1fr 1fr 48px; gap: 8px; margin-bottom: 6px; padding: 0 4px; }
.sets-header-label { font-size: 9px; color: #555; letter-spacing: 0.2em; font-weight: 700; text-align: center; text-transform: uppercase; }
.set-row { display: grid; grid-template-columns: 50px 1fr 1fr 48px; gap: 8px; align-items: center; margin-bottom: 6px; }
.set-label { font-size: 10px; color: #666; font-weight: 800; letter-spacing: 0.15em; text-align: center; }
.set-input { width: 100%; padding: 10px 8px; border: 1px solid #333; border-radius: 4px; background: #0f0f0f; font-size: 14px; text-align: center; color: #fff; font-weight: 700; }
.set-input:focus { outline: none; border-color: #00ff88; }
.set-input::placeholder { color: #444; font-weight: 400; }
.set-check { width: 40px; height: 40px; border-radius: 4px; background: #0f0f0f; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 800; color: #555; transition: all 0.15s; }
.set-check.done { background: #00ff88; color: #0f0f0f; border-color: #00ff88; }

.mark-done-btn { margin-top: 12px; padding: 10px 14px; background: #0f0f0f; color: #666; border: 1px solid #333; border-radius: 4px; font-size: 11px; letter-spacing: 0.15em; font-weight: 800; text-transform: uppercase; }
.mark-done-btn.done { background: #00ff88; color: #0f0f0f; border-color: #00ff88; }

/* PROGRAM VIEW */
.principles { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 20px; border-radius: 6px; margin-bottom: 20px; }
.principles-title { font-size: 11px; color: #00ff88; font-weight: 800; letter-spacing: 0.25em; margin-bottom: 12px; text-transform: uppercase; }
.principle { font-size: 13px; color: #ccc; line-height: 1.6; margin-bottom: 8px; padding-left: 14px; position: relative; }
.principle::before { content: '▸'; position: absolute; left: 0; color: #00ff88; }

.week-advance { margin-top: 24px; background: #1a1a1a; border: 1px solid #2a2a2a; padding: 16px 18px; border-radius: 6px; }

/* HISTORY */
.empty { text-align: center; padding: 60px 20px; color: #666; }
.empty-icon { font-size: 32px; opacity: 0.3; }

.history-reflection { background: #242424; border-radius: 4px; padding: 10px 12px; margin-top: 10px; font-size: 12px; color: #bbb; line-height: 1.5; }
.history-reflection-feeling { display: inline-block; margin-right: 8px; font-size: 16px; }
.history-reflection-label { font-size: 9px; letter-spacing: 0.2em; font-weight: 800; text-transform: uppercase; color: #00ff88; margin-right: 6px; }

/* BODYWEIGHT TRACKING */
.bw-card { background: linear-gradient(135deg, #1a3a2a, #0f2a1f); border: 1px solid #00ff88; border-radius: 8px; padding: 16px 18px; margin-bottom: 20px; }
.bw-title { font-size: 11px; color: #00ff88; letter-spacing: 0.25em; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
.bw-row { display: flex; align-items: center; gap: 10px; }
.bw-input { flex: 1; padding: 12px 14px; border: 1px solid #2a5a3a; border-radius: 4px; background: #0f0f0f; color: #fff; font-size: 16px; font-weight: 700; }
.bw-input:focus { outline: none; border-color: #00ff88; }
.bw-save { background: #00ff88; color: #0f0f0f; padding: 12px 20px; border-radius: 4px; font-weight: 800; font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; }
.bw-history { margin-top: 12px; font-size: 12px; color: #8fbca1; }

/* REFLECTION MODAL */
.flash { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #00ff88; color: #0f0f0f; padding: 12px 20px; border-radius: 6px; font-size: 12px; letter-spacing: 0.1em; font-weight: 800; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.3s; text-transform: uppercase; }
.flash.show { opacity: 1; }

.reflection-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 50; display: flex; align-items: flex-end; justify-content: center; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
.reflection-modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 14px 14px 8px 8px; padding: 26px 22px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease-out; }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.reflection-title { font-size: 26px; font-weight: 900; color: #fff; font-style: italic; text-transform: uppercase; }
.reflection-subtitle { font-size: 11px; color: #00ff88; letter-spacing: 0.2em; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; margin-top: 4px; }
.reflection-section-label { font-size: 10px; color: #00ff88; letter-spacing: 0.25em; font-weight: 800; text-transform: uppercase; margin-top: 20px; margin-bottom: 10px; }
.feeling-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.feeling-btn { background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 8px; padding: 14px 6px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.feeling-btn.selected { background: #00ff88; color: #0f0f0f; border-color: #00ff88; }
.feeling-emoji { font-size: 26px; line-height: 1; }
.feeling-label { font-size: 10px; letter-spacing: 0.12em; font-weight: 800; text-transform: uppercase; }
.notes-input { width: 100%; min-height: 90px; padding: 12px 14px; border: 1px solid #333; border-radius: 6px; background: #0f0f0f; font-family: inherit; font-size: 14px; color: #fff; line-height: 1.5; resize: vertical; box-sizing: border-box; }
.notes-input:focus { outline: none; border-color: #00ff88; }
.notes-input::placeholder { color: #555; }
.knee-check { display: flex; gap: 8px; flex-wrap: wrap; }
.knee-btn { flex: 1; min-width: 80px; background: #0f0f0f; border: 1px solid #2a2a2a; border-radius: 6px; padding: 12px 6px; font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #888; }
.knee-btn.selected { border-color: #00ff88; background: #00ff88; color: #0f0f0f; }
.knee-btn.selected.warn { border-color: #ff3d71; background: #ff3d71; color: #fff; }
.reflection-buttons { display: flex; gap: 10px; margin-top: 24px; }
.reflection-buttons button { flex: 1; }
.btn-skip { background: transparent; color: #666; border: 1px solid #2a2a2a; padding: 14px; border-radius: 6px; font-size: 12px; letter-spacing: 0.15em; font-weight: 800; text-transform: uppercase; }
.btn-save { background: #00ff88; color: #0f0f0f; padding: 14px; border-radius: 6px; font-size: 12px; letter-spacing: 0.15em; font-weight: 800; text-transform: uppercase; }
</style>
</head>
<body>
<div id="app"></div>
<div id="flash" class="flash"></div>

<script>
// =========== PROGRAM: RECOMP PROTOCOL (5-day Upper/Lower + ACL-smart) ===========
const PROGRAM = {
  name: "RECOMP PROTOCOL",
  description: "5-day upper/lower split · hypertrophy-focused · ACL-smart",
  principles: [
    "Train each muscle 2x/week — optimal frequency for recomp at your experience level.",
    "Progressive overload is king: add 1-2 reps each week, then add weight when you hit the top of the range.",
    "Single-leg work is non-negotiable — your injured leg needs to catch up, and unilateral strength predicts knee health.",
    "Track bodyweight weekly, not daily. Recomp is slow. Trust the process, 12+ weeks minimum.",
    "ACL rule #1: never push through knee pain. Sharp or new pain = stop and check in with your physio.",
    "Deload every 6 weeks: drop volume by 40% and weights by 20%. Your CNS will thank you.",
    "Sleep 8+ hours and eat at (or slightly above) maintenance for recomp. Food and sleep drive results as much as training.",
  ],
  days: [
    {
      id: 'day1', name: 'UPPER A', subtitle: 'Chest · Back · Shoulders · Arms', type: 'upper',
      playlist: { name: 'Add your playlist', url: 'https://open.spotify.com/' },
      warmup: '5 min easy cardio, then: arm circles, band pull-aparts x15, scapular push-ups x10, shoulder dislocates with band x10.',
      exercises: [
        { name: 'Flat Dumbbell Bench Press', sets: 4, reps: '8-10', rest: 120, notes: 'Chest builder. Control the descent, drive up powerfully. Log top set weight.', video: 'https://www.youtube.com/results?search_query=flat+dumbbell+bench+press+form' },
        { name: 'Chest-Supported Row', sets: 4, reps: '8-10', rest: 120, notes: 'Back thickness. Chest on incline bench. Row elbows to hips, squeeze hard.', video: 'https://www.youtube.com/results?search_query=chest+supported+dumbbell+row+form' },
        { name: 'Overhead Dumbbell Press', sets: 3, reps: '8-12', rest: 90, notes: 'Seated for stability. Press straight up, don\'t flare elbows forward.', video: 'https://www.youtube.com/results?search_query=seated+dumbbell+shoulder+press+form' },
        { name: 'Lat Pulldown (Wide Grip)', sets: 3, reps: '10-12', rest: 90, notes: 'Lean back slightly, pull to upper chest, squeeze lats at bottom.', video: 'https://www.youtube.com/results?search_query=wide+grip+lat+pulldown+form' },
        { name: 'Dumbbell Lateral Raises', sets: 4, reps: '12-15', rest: 60, notes: 'Shoulder width. Lead with elbows, slight forward angle. Light weight, strict form.', video: 'https://www.youtube.com/results?search_query=dumbbell+lateral+raise+form' },
        { name: 'EZ-Bar Bicep Curls', sets: 3, reps: '10-12', rest: 60, notes: 'No swinging. Full range, squeeze at top. Last set to failure if form holds.', video: 'https://www.youtube.com/results?search_query=EZ+bar+bicep+curl+form' },
        { name: 'Rope Tricep Pushdowns', sets: 3, reps: '12-15', rest: 60, notes: 'Elbows pinned to ribs. Spread the rope apart at the bottom for full contraction.', video: 'https://www.youtube.com/results?search_query=rope+tricep+pushdown+form' },
      ]
    },
    {
      id: 'day2', name: 'LOWER A', subtitle: 'ACL-Smart · Quad-Focused', type: 'lower',
      aclFlag: true,
      playlist: { name: 'Add your playlist', url: 'https://open.spotify.com/' },
      warmup: '5-10 min bike (NOT running). Then: bodyweight squats x15, glute bridges x15, terminal knee extensions with band x15 each leg, walking lunges x10 each.',
      exercises: [
        { name: 'Leg Press', sets: 4, reps: '10-12', rest: 120, notes: 'Bilateral main lift. Feet shoulder-width, slightly higher placement = more glute/hamstring (knee-friendlier). Don\'t lock out knees.', aclNote: 'Start lighter than you think. 3 sec descent. No bouncing at bottom.', video: 'https://www.youtube.com/results?search_query=leg+press+form+ACL+friendly' },
        { name: 'Bulgarian Split Squat', sets: 3, reps: '10 each leg', rest: 90, notes: 'Elite single-leg builder. Rear foot on bench. Front shin vertical. Drive through whole foot.', aclNote: 'Start ops leg FIRST — match reps with good leg. Use dumbbells for weight, hold TRX or wall for balance if needed.', video: 'https://www.youtube.com/results?search_query=bulgarian+split+squat+form' },
        { name: 'Romanian Deadlift', sets: 3, reps: '8-10', rest: 120, notes: 'Hamstring hypertrophy gold. Slight knee bend, hinge at hips, bar close to legs. Feel the stretch.', video: 'https://www.youtube.com/results?search_query=romanian+deadlift+form' },

// =========== HELPERS ===========
const typeColor = (t) => {
  if (t === 'upper') return '#00ff88';
  if (t === 'lower') return '#ff3d71';
  if (t === 'cardio') return '#8e6bcc';
  return '#666';
};
const typeLabel = (t) => t === 'upper' ? 'UPPER' : t === 'lower' ? 'LOWER' : 'CARDIO';
const fmtTime = (s) => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const fmtDuration = (s) => {
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60);
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  return `${m}m ${String(s%60).padStart(2,'0')}s`;
};
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

const save = () => {
  localStorage.setItem('recomp-history', JSON.stringify(state.history));
  localStorage.setItem('recomp-week', JSON.stringify(state.currentWeek));
  localStorage.setItem('recomp-last-logs', JSON.stringify(state.lastLogs));
  localStorage.setItem('recomp-bodyweight', JSON.stringify(state.bodyweight));
};

const flash = (msg) => {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
};

const isDeload = () => state.currentWeek % 6 === 0;

const stats = () => {
  const weekAgo = Date.now() - 7*24*60*60*1000;
  const weekly = state.history.filter(h => new Date(h.date).getTime() >= weekAgo);
  return { weekly: weekly.length, lifts: weekly.filter(h => h.type === 'upper' || h.type === 'lower').length, total: state.history.length };
};

// =========== AUDIO ===========
function playBeep() {
  try {
    if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = state.audioCtx;
    [0, 0.18, 0.36].forEach((delay, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.value = [523, 659, 784][i];
      gain.gain.setValueAtTime(0, ctx.currentTime + delay);
      gain.gain.linearRampToValueAtTime(0.2, ctx.currentTime + delay + 0.02);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + 0.15);
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.15);
    });
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  } catch (e) {}
}
function primeAudio() {
  if (!state.audioCtx) {
    try {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (state.audioCtx.state === 'suspended') state.audioCtx.resume();
    } catch (e) {}
  }
}

        <div class="reflection-buttons">
          <button class="btn-skip" data-action="save-session-skip">SKIP & SAVE</button>
          <button class="btn-save" data-action="save-session-with-reflection">SAVE ✓</button>
        </div>
      </div>
    </div>
  `;
}

function renderProgram() {
  return `
    <div class="container">
      <div class="header">
        <div class="logo">◆ PROGRAM</div>
        <h1 class="heading">${esc(PROGRAM.name)}</h1>
        <div class="subheading">${esc(PROGRAM.description)}</div>
      </div>

      <div class="acl-warning" style="margin-bottom:20px">
        <div class="acl-warning-icon">⚠</div>
        <div class="acl-warning-text">
          <strong>ACL Reconstruction — Important.</strong> This programme is designed with your 6-months-post-op status in mind, but it's no substitute for your physio's guidance. Keep doing your prescribed rehab exercises alongside this. No pivoting, cutting, or plyometrics until fully cleared (usually 9-12 months). When in doubt, ask your physio.
        </div>
      </div>

      <div class="principles">
        <div class="principles-title">PROTOCOL PRINCIPLES</div>
        ${PROGRAM.principles.map(p => `<div class="principle">${esc(p)}</div>`).join('')}
      </div>

      <div class="section-label">THE WEEK</div>

      ${PROGRAM.days.map((d, i) => `
        <div class="day-card" style="cursor:default">
          <div class="day-content">
            <div class="day-num">DAY ${i+1}${d.aclFlag ? ' · ACL-SMART' : ''}</div>
            <div class="day-name" style="font-size:16px">${esc(d.name)}</div>
            <div class="day-subtitle">${esc(d.subtitle)}</div>
          </div>
          <div class="pill pill-${d.type === 'upper' ? 'upper' : d.type === 'lower' ? 'lower' : 'cardio'}">${typeLabel(d.type)}</div>
        </div>
      `).join('')}

      <div class="week-advance">
        <div class="principles-title">WEEK ${state.currentWeek}${isDeload() ? ' · DELOAD' : ''}</div>
        <div style="font-size:12px;color:#888;margin-bottom:12px">
          ${isDeload() ? 'Deload week. Drop volume 40% and weights 20%. You\'ll come back stronger.' : `${6 - (state.currentWeek % 6)} week(s) until next deload.`}
        </div>
        <button class="btn-secondary" data-action="advance-week">ADVANCE TO WEEK ${state.currentWeek + 1} →</button>
      </div>
    </div>
    ${renderNav()}
  `;
}

function renderHistory() {
  const feelingMap = { beast: '🔥', solid: '💪', okay: '😐', struggle: '😓' };
  const feelingLabelMap = { beast: 'Beast', solid: 'Solid', okay: 'Okay', struggle: 'Struggled' };
  const kneeMap = { great: '✓ Knee great', normal: '✓ Knee normal', stiff: '⚠ Knee stiff', painful: '🚨 Knee painful' };

  // bodyweight trend
  const bw = state.bodyweight;
  let bwTrend = null;
  if (bw.length >= 2) {
    const latest = bw[0].weight;
    const oldest = bw[bw.length - 1].weight;
    const diff = (latest - oldest).toFixed(1);
    bwTrend = { latest, oldest, diff, count: bw.length };
  }

  return `
    <div class="container">
      <div class="header">
        <div class="logo">◆ LOG</div>
        <h1 class="heading">History</h1>
        <div class="subheading">The data never lies.</div>
      </div>

      ${bwTrend ? `
        <div class="bw-card" style="margin-bottom:20px">
          <div class="bw-title">Bodyweight trend</div>
          <div style="font-size:22px;color:#fff;font-weight:900;font-style:italic">
            ${bwTrend.latest}kg <span style="font-size:13px;color:${parseFloat(bwTrend.diff) > 0 ? '#ff3d71' : parseFloat(bwTrend.diff) < 0 ? '#00ff88' : '#888'};font-weight:700">
              ${bwTrend.diff > 0 ? '+' : ''}${bwTrend.diff}kg over ${bwTrend.count} entries
            </span>
          </div>
        </div>
      ` : ''}

      ${state.history.length === 0 ? `
        <div class="empty">
          <div class="empty-icon">◌</div>
          <div style="margin-top:16px;font-size:12px;letter-spacing:0.15em;font-weight:700;text-transform:uppercase">NO SESSIONS YET</div>
          <div style="margin-top:8px;font-size:13px">Pick a day and start building.</div>
        </div>
      ` : `
        ${state.history.map(h => `
          <div class="day-card" style="cursor:default;display:block">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
              <div>
                <div style="font-size:10px;color:${typeColor(h.type)};font-weight:800;letter-spacing:0.2em">
                  W${h.week} · ${new Date(h.date).toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' }).toUpperCase()}${h.duration ? ` · ${fmtDuration(h.duration)}` : ''}
                </div>
                <div class="day-name" style="font-size:17px">${esc(h.day)}</div>
                <div class="day-subtitle">${esc(h.subtitle)}</div>
              </div>
              <div class="pill pill-${h.type === 'upper' ? 'upper' : h.type === 'lower' ? 'lower' : 'cardio'}">${typeLabel(h.type)}</div>
            </div>
            ${(h.feeling || h.knee || h.notes) ? `
              <div class="history-reflection">
                ${h.feeling ? `<span class="history-reflection-feeling">${feelingMap[h.feeling] || ''}</span><span class="history-reflection-label">${feelingLabelMap[h.feeling] || ''}</span>` : ''}
                ${h.knee ? `<span style="margin-left:8px;color:${h.knee === 'stiff' || h.knee === 'painful' ? '#ff3d71' : '#00ff88'};font-weight:700;font-size:11px">${kneeMap[h.knee] || ''}</span>` : ''}
                ${h.notes ? `<div style="margin-top:${h.feeling || h.knee ? '6px' : '0'};color:#bbb">${esc(h.notes)}</div>` : ''}
              </div>
            ` : ''}
          </div>
        `).join('')}
        <button class="btn-danger" data-action="reset">RESET ALL DATA</button>
      `}
    </div>
    ${renderNav()}
  `;
}

function renderNav() {
  return `
    <div class="nav">
      <button class="nav-btn ${state.view === 'dashboard' ? 'active' : ''}" data-nav="dashboard">
        <span class="nav-icon">⚡</span>Today
      </button>
      <button class="nav-btn ${state.view === 'program' ? 'active' : ''}" data-nav="program">
        <span class="nav-icon">▤</span>Program
      </button>
      <button class="nav-btn ${state.view === 'history' ? 'active' : ''}" data-nav="history">
        <span class="nav-icon">📊</span>History
      </button>
    </div>
  `;
}

// =========== RENDER ===========
let lastRenderedView = null;
function render() {
  const app = document.getElementById('app');
  const active = document.activeElement;
  const activeLog = active && active.dataset && active.dataset.log ? { log: active.dataset.log, ex: active.dataset.ex, set: active.dataset.set, selStart: active.selectionStart, selEnd: active.selectionEnd } : null;
  const scrollY = window.scrollY;
  const currentView = state.view;
  const viewChanged = currentView !== lastRenderedView;

  if (state.view === 'workout' && state.currentDay) app.innerHTML = renderWorkout() + renderReflectionModal();
  else if (state.view === 'program') app.innerHTML = renderProgram();
  else if (state.view === 'history') app.innerHTML = renderHistory();
  else app.innerHTML = renderDashboard();

  if (activeLog) {
    const restored = document.querySelector(`[data-log="${activeLog.log}"][data-ex="${activeLog.ex}"][data-set="${activeLog.set}"]`);
    if (restored) {
      restored.focus();
      try { restored.setSelectionRange(activeLog.selStart, activeLog.selEnd); } catch(e){}
      window.scrollTo(0, scrollY);
      lastRenderedView = currentView;
      return;
    }
  }
  if (viewChanged) window.scrollTo(0, 0);
  else window.scrollTo(0, scrollY);
  lastRenderedView = currentView;
}

// =========== EVENTS ===========
document.addEventListener('click', (e) => {
  primeAudio();

  const nav = e.target.closest('[data-nav]');
  if (nav) { state.view = nav.dataset.nav; render(); return; }

  const dayCard = e.target.closest('[data-day]');
  if (dayCard && state.view === 'dashboard') {
    state.currentDay = PROGRAM.days.find(d => d.id === dayCard.dataset.day);
    state.view = 'workout';
    state.completedSets = {};
    state.setLogs = {};
    render();
    return;
  }

  const action = e.target.closest('[data-action]');
  if (!action) return;
  const a = action.dataset.action;

  if (a === 'back') {
    state.currentDay = null;
    state.view = 'dashboard';
    state.completedSets = {};
    state.setLogs = {};
    stopSessionTimer();
    state.sessionStart = null;
    state.sessionElapsed = 0;
    stopTimer();
    state.showingReflection = false;
    state.reflectionFeeling = null;
    state.reflectionKnee = null;
    state.reflectionNotes = '';
    render();
  } else if (a === 'start-session') {
    state.sessionStart = Date.now();
    state.sessionElapsed = 0;
    startSessionTimer();
    flash('Go time 🔥');
    render();
  } else if (a === 'stop-session') {
    stopSessionTimer();
    flash(`Session: ${fmtDuration(state.sessionElapsed)}`);
    render();
  } else if (a === 'toggle-set') {
    const ei = action.dataset.ex, si = action.dataset.set, rest = +action.dataset.rest;
    const key = `w${state.currentWeek}-${state.currentDay.id}-ex${ei}-set${si}`;
    const was = state.completedSets[key];
    state.completedSets[key] = !was;
    if (!was && rest > 0) startTimer(rest);
    render();
  } else if (a === 'toggle-mark') {
    const ei = action.dataset.ex;
    const key = `w${state.currentWeek}-${state.currentDay.id}-ex${ei}-set0`;
    state.completedSets[key] = !state.completedSets[key];
    render();
  } else if (a === 'skip-timer') {
    stopTimer();
    render();
  } else if (a === 'complete') {
    state.showingReflection = true;
    state.reflectionFeeling = null;
    state.reflectionKnee = null;
    state.reflectionNotes = '';
    render();
  } else if (a === 'set-feeling') {
    state.reflectionFeeling = action.dataset.feeling;
    render();
  } else if (a === 'set-knee') {
    state.reflectionKnee = action.dataset.knee;
    render();
  } else if (a === 'reflection-backdrop') {
    if (e.target.classList.contains('reflection-overlay')) {
      const notesEl = document.getElementById('reflection-notes');
      if (notesEl) state.reflectionNotes = notesEl.value;
      state.showingReflection = false;
      render();
    }
  } else if (a === 'save-session-skip' || a === 'save-session-with-reflection') {
    const notesEl = document.getElementById('reflection-notes');
    if (notesEl) state.reflectionNotes = notesEl.value;
    saveCurrentSession(a === 'save-session-with-reflection');
  } else if (a === 'log-bodyweight') {
    const input = document.getElementById('bw-input');
    const val = parseFloat(input.value);
    if (!isNaN(val) && val > 0) {
      state.bodyweight.unshift({ date: new Date().toISOString(), weight: val });
      save();
      flash(`${val}kg logged ✓`);
      render();
    } else {
      flash('Enter a valid weight');
    }
  } else if (a === 'advance-week') {
    state.currentWeek += 1;
    save();
    render();
  } else if (a === 'reset') {
    if (confirm('Reset everything? This cannot be undone.')) {
      state.history = [];
      state.lastLogs = {};
      state.currentWeek = 1;
      state.bodyweight = [];
      save();
      render();
    }
  }
});

document.addEventListener('input', (e) => {
  const t = e.target;
  if (t.dataset && t.dataset.log && state.currentDay) {
    const ei = t.dataset.ex, si = t.dataset.set;
    const logKey = `${state.currentDay.id}-ex${ei}-set${si}`;
    if (!state.setLogs[logKey]) state.setLogs[logKey] = {};
    state.setLogs[logKey][t.dataset.log] = t.value;
  }
  if (t.id === 'reflection-notes') state.reflectionNotes = t.value;
});

// =========== SAVE SESSION ===========
function saveCurrentSession(includeReflection) {
  const d = state.currentDay;
  if (!d) return;

  d.exercises.forEach((ex, ei) => {
    const exLogs = [];
    for (let si = 0; si < ex.sets; si++) {
      const logKey = `${d.id}-ex${ei}-set${si}`;
      exLogs.push(state.setLogs[logKey] || {});
    }
    if (exLogs.some(l => l.weight || l.reps)) {
      state.lastLogs[`${d.id}-ex${ei}`] = exLogs;
    }
  });

  const entry = {
    date: new Date().toISOString(),
    week: state.currentWeek,
    day: d.name,
    subtitle: d.subtitle,
    type: d.type,
    setsCompleted: Object.values(state.completedSets).filter(Boolean).length,
    duration: state.sessionElapsed > 0 ? state.sessionElapsed : null,
  };

  if (includeReflection) {
    if (state.reflectionFeeling) entry.feeling = state.reflectionFeeling;
    if (state.reflectionKnee) entry.knee = state.reflectionKnee;
    if (state.reflectionNotes && state.reflectionNotes.trim()) entry.notes = state.reflectionNotes.trim();
  }

  state.history.unshift(entry);
  save();

  state.completedSets = {};
  state.setLogs = {};
  state.currentDay = null;
  state.view = 'dashboard';
  state.sessionStart = null;
  state.sessionElapsed = 0;
  state.showingReflection = false;
  state.reflectionFeeling = null;
  state.reflectionKnee = null;
  state.reflectionNotes = '';
  stopSessionTimer();
  stopTimer();
  flash('Locked in ✓');
  render();
}

// =========== TIMERS ===========
function startTimer(seconds) {
  stopTimer();
  state.restTimer = seconds;
  state.timerActive = true;
  state.timerInterval = setInterval(() => {
    state.restTimer -= 1;
    if (state.restTimer <= 0) {
      playBeep();
      flash('Rest done — next set');
      stopTimer();
    }
    render();
  }, 1000);
}
function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.timerActive = false;
  state.restTimer = 0;
}
function startSessionTimer() {
  stopSessionTimer();
  state.sessionInterval = setInterval(() => {
    if (state.sessionStart) {
      state.sessionElapsed = Math.floor((Date.now() - state.sessionStart) / 1000);
      render();
    }
  }, 1000);
}
function stopSessionTimer() {
  if (state.sessionInterval) clearInterval(state.sessionInterval);
  state.sessionInterval = null;
}

render();
</script>
</body>
</html>
